services:
  vscam:
    image: ghcr.io/vs-cloud-technologies-private-limited/vscam:latest
    build: .
    container_name: vscam
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "0.0.0.0:8765:8765"
    volumes:
      - ./hls:/app/hls
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: "8765"
      WEB_BASE_URL: http://${HOST_IP:-127.0.0.1}:8765
    # For LAN (camera + http://192.168.60.51:8765), use docker-compose.lan.yml — see README.
